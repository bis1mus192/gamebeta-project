<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои подписки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><span class="logo-img">🎮</span><span class="logo-text">GameBeta</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Игры</a></li>
                <li><a href="actions.html">Акции</a></li>
                <li><a href="mysub.html">Мои подписки</a></li>
                <li><a href="sub.html" class="cart-icon">🛒<span id="cartCount" class="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>📦 Мои активные подписки</h1>
        <div id="subscriptionsList">Загрузка...</div>
    </main>
    <footer>© 2026 GameBeta</footer>
    <script src="bin-class.js"></script>
    <script>
        const cart = new Cart();
        const container = document.getElementById('subscriptionsList');
        if(cart.getTotalCount() === 0) {
            container.innerHTML = '<p>У вас пока нет подписок. Перейдите в <a href="1.html">каталог</a>.</p>';
        } else {
            let html = '<ul>';
            cart.items.forEach(item => {
                html += `<li>${item.name} — ${item.quantity} шт., ${item.price * item.quantity} ₽</li>`;
            });
            html += `</ul><p><strong>Итого:</strong> ${cart.getTotal()} ₽</p><p><a href="sub.html">Оформить заказ</a></p>`;
            container.innerHTML = html;
        }
        document.getElementById('cartCount').innerText = cart.getTotalCount();
    </script>
</body>
</html>
